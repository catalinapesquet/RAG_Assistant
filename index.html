<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RAG Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet" />

<style>
  /* ── Reset & tokens ─────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0c0d0f;
    --surface:   #13151a;
    --border:    #1f2229;
    --border-hi: #2e3340;
    --accent:    #c8f04a;
    --accent-dim:#8aaa2d;
    --muted:     #4a5060;
    --text:      #d8dce8;
    --text-dim:  #767d8f;
    --source-bg: #0f1116;
    --radius:    12px;
    --font-mono: 'DM Mono', monospace;
    --font-serif:'Fraunces', Georgia, serif;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 14px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Layout ─────────────────────────────────────────────────────── */
  .shell {
    display: grid;
    grid-template-rows: auto 1fr auto;
    height: 100vh;
    max-width: 900px;
    margin: 0 auto;
    padding: 0 20px;
  }

  /* ── Header ─────────────────────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 0 18px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .logo-word {
    font-family: var(--font-serif);
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: #fff;
  }

  .logo-tag {
    font-size: 11px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 500;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11px;
    color: var(--text-dim);
    padding: 5px 12px;
    border: 1px solid var(--border);
    border-radius: 20px;
    transition: all 0.3s;
  }

  .status-pill.ok   { border-color: #2a3a1a; color: var(--accent-dim); }
  .status-pill.err  { border-color: #3a1a1a; color: #f04a4a; }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  .status-pill.ok  .dot { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .status-pill.err .dot { background: #f04a4a; }

  /* ── Conversation ────────────────────────────────────────────────── */
  .convo {
    overflow-y: auto;
    padding: 28px 0;
    display: flex;
    flex-direction: column;
    gap: 32px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .convo::-webkit-scrollbar { width: 4px; }
  .convo::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* empty state */
  .empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--muted);
    text-align: center;
    animation: fadeIn 0.6s ease both;
  }

  .empty-icon {
    width: 56px; height: 56px;
    border: 1px solid var(--border-hi);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    color: var(--border-hi);
  }

  .empty h2 {
    font-family: var(--font-serif);
    font-size: 20px;
    font-weight: 300;
    font-style: italic;
    color: var(--text-dim);
  }

  .empty p { font-size: 12px; color: var(--muted); max-width: 280px; }

  /* suggestion chips */
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 8px;
  }

  .chip {
    padding: 6px 14px;
    border: 1px solid var(--border-hi);
    border-radius: 20px;
    font-size: 12px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
    background: none;
    font-family: var(--font-mono);
  }

  .chip:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(200,240,74,0.05);
  }

  /* ── Message bubbles ─────────────────────────────────────────────── */
  .msg { animation: slideUp 0.35s cubic-bezier(0.16,1,0.3,1) both; }

  .msg-user {
    display: flex;
    justify-content: flex-end;
  }

  .bubble-user {
    max-width: 72%;
    background: var(--surface);
    border: 1px solid var(--border-hi);
    border-radius: var(--radius) var(--radius) 4px var(--radius);
    padding: 12px 16px;
    font-size: 14px;
    color: #fff;
  }

  .msg-assistant { display: flex; flex-direction: column; gap: 12px; }

  .assistant-header {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .assistant-header::before {
    content: '';
    width: 16px; height: 1px;
    background: var(--accent);
    flex-shrink: 0;
  }

  .bubble-assistant {
    font-family: var(--font-serif);
    font-size: 16px;
    font-weight: 300;
    line-height: 1.75;
    color: var(--text);
    padding-left: 24px;
    border-left: 2px solid var(--border-hi);
  }

  /* ── Sources ─────────────────────────────────────────────────────── */
  .sources-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--text-dim);
    cursor: pointer;
    padding: 0 0 0 24px;
    background: none;
    border: none;
    font-family: var(--font-mono);
    transition: color 0.2s;
    user-select: none;
  }

  .sources-toggle:hover { color: var(--accent); }

  .chevron {
    display: inline-block;
    transition: transform 0.25s;
  }

  .sources-toggle[aria-expanded="true"] .chevron { transform: rotate(90deg); }

  .sources-list {
    display: none;
    flex-direction: column;
    gap: 8px;
    margin-top: 4px;
    padding-left: 24px;
  }

  .sources-list.open { display: flex; }

  .source-card {
    background: var(--source-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.55;
    position: relative;
    overflow: hidden;
  }

  .source-card::before {
    content: attr(data-index);
    position: absolute;
    top: 10px; right: 12px;
    font-size: 10px;
    color: var(--muted);
  }

  .source-text {
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ── Meta ────────────────────────────────────────────────────────── */
  .meta {
    display: flex;
    align-items: center;
    gap: 16px;
    padding-left: 24px;
    font-size: 11px;
    color: var(--muted);
  }

  .meta span { display: flex; align-items: center; gap: 4px; }

  /* ── Thinking animation ──────────────────────────────────────────── */
  .thinking {
    display: flex;
    gap: 5px;
    padding-left: 24px;
    align-items: center;
  }

  .thinking-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.3;
    animation: pulse 1.2s ease-in-out infinite;
  }

  .thinking-dot:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dot:nth-child(3) { animation-delay: 0.4s; }

  /* ── Input zone ──────────────────────────────────────────────────── */
  .input-zone {
    padding: 16px 0 24px;
    border-top: 1px solid var(--border);
  }

  .input-wrap {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border-hi);
    border-radius: var(--radius);
    padding: 10px 10px 10px 16px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .input-wrap:focus-within {
    border-color: var(--accent-dim);
    box-shadow: 0 0 0 3px rgba(200,240,74,0.06);
  }

  textarea {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: #fff;
    font-family: var(--font-mono);
    font-size: 14px;
    line-height: 1.5;
    resize: none;
    max-height: 140px;
    min-height: 22px;
    overflow-y: auto;
  }

  textarea::placeholder { color: var(--muted); }

  .send-btn {
    width: 36px; height: 36px;
    border-radius: 8px;
    border: none;
    background: var(--accent);
    color: #0c0d0f;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.1s;
  }

  .send-btn:hover { background: #d8ff55; }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { background: var(--border-hi); cursor: not-allowed; }
  .send-btn svg { width: 16px; height: 16px; }

  .input-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
    font-size: 11px;
    color: var(--muted);
  }

  .topk-control { display: flex; align-items: center; gap: 8px; }

  .topk-control input[type=range] {
    -webkit-appearance: none;
    width: 80px; height: 2px;
    background: var(--border-hi);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  .topk-control input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }

  /* ── Keyframes ───────────────────────────────────────────────────── */
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: scale(0.9); }
    50%       { opacity: 1;   transform: scale(1.1); }
  }

  /* ── Scrollbar ───────────────────────────────────────────────────── */
  textarea::-webkit-scrollbar { width: 3px; }
  textarea::-webkit-scrollbar-thumb { background: var(--border); }
</style>
</head>
<body>
<div class="shell">

  <!-- Header -->
  <header>
    <div class="logo">
      <span class="logo-word">RAG Assistant</span>
      <span class="logo-tag">local · Mistral-7B</span>
    </div>
    <div class="status-pill" id="statusPill">
      <span class="dot"></span>
      <span id="statusLabel">connecting…</span>
    </div>
  </header>

  <!-- Conversation -->
  <div class="convo" id="convo">
    <div class="empty" id="emptyState">
      <div class="empty-icon">⌬</div>
      <h2>Posez votre première question</h2>
      <p>Le moteur RAG interroge vos documents indexés dans Milvus puis génère une réponse avec Mistral-7B.</p>
      <div class="chips" id="chips">
        <button class="chip">Qu'est-ce que ce document explique&nbsp;?</button>
        <button class="chip">Résume les points clés</button>
        <button class="chip">Quelles sont les étapes décrites&nbsp;?</button>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-zone">
    <div class="input-wrap">
      <textarea id="questionInput" rows="1" placeholder="Entrez votre question…" autocomplete="off"></textarea>
      <button class="send-btn" id="sendBtn" aria-label="Envoyer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div class="input-footer">
      <span>⏎ envoyer · Maj+⏎ saut de ligne</span>
      <div class="topk-control">
        <span>Sources</span>
        <input type="range" id="topkRange" min="1" max="10" value="5" />
        <span id="topkVal">5</span>
      </div>
    </div>
  </div>

</div>

<script>
  const API = '';          // empty = same origin; change to 'http://localhost:8000' if needed
  const convo    = document.getElementById('convo');
  const input    = document.getElementById('questionInput');
  const sendBtn  = document.getElementById('sendBtn');
  const statusPill  = document.getElementById('statusPill');
  const statusLabel = document.getElementById('statusLabel');
  const topkRange= document.getElementById('topkRange');
  const topkVal  = document.getElementById('topkVal');
  const emptyState = document.getElementById('emptyState');
  const chips    = document.getElementById('chips');

  let busy = false;

  /* ── Health check ──────────────────────────────────────────────── */
  async function checkHealth() {
    try {
      const r = await fetch(`${API}/health`);
      if (r.ok) { setStatus('ok', 'connecté'); }
      else       { setStatus('err', 'erreur serveur'); }
    } catch {
      setStatus('err', 'hors-ligne');
    }
  }

  function setStatus(state, label) {
    statusPill.className = `status-pill ${state}`;
    statusLabel.textContent = label;
  }

  checkHealth();

  /* ── topk slider ───────────────────────────────────────────────── */
  topkRange.addEventListener('input', () => { topkVal.textContent = topkRange.value; });

  /* ── Auto-resize textarea ──────────────────────────────────────── */
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 140) + 'px';
  });

  /* ── Keyboard shortcuts ────────────────────────────────────────── */
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  sendBtn.addEventListener('click', send);

  /* ── Suggestion chips ──────────────────────────────────────────── */
  chips.querySelectorAll('.chip').forEach(c => {
    c.addEventListener('click', () => {
      input.value = c.textContent.trim();
      input.dispatchEvent(new Event('input'));
      input.focus();
    });
  });

  /* ── Send ──────────────────────────────────────────────────────── */
  async function send() {
    const q = input.value.trim();
    if (!q || busy) return;

    busy = true;
    sendBtn.disabled = true;

    // Hide empty state
    if (emptyState) emptyState.remove();

    // User bubble
    appendUser(q);
    input.value = '';
    input.style.height = 'auto';

    // Thinking indicator
    const thinkId = appendThinking();

    try {
      const res = await fetch(`${API}/query`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: q, top_k: parseInt(topkRange.value) })
      });

      removeElement(thinkId);

      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: res.statusText }));
        appendError(err.detail || 'Erreur inconnue');
      } else {
        const data = await res.json();
        appendAssistant(data);
      }
    } catch (e) {
      removeElement(thinkId);
      appendError('Impossible de contacter le serveur. Est-ce qu\'uvicorn tourne ?');
      setStatus('err', 'hors-ligne');
    }

    busy = false;
    sendBtn.disabled = false;
    input.focus();
  }

  /* ── DOM helpers ───────────────────────────────────────────────── */
  function appendUser(text) {
    const el = div('msg msg-user');
    el.innerHTML = `<div class="bubble-user">${esc(text)}</div>`;
    convo.appendChild(el);
    scroll();
  }

  function appendThinking() {
    const id = 'think-' + Date.now();
    const el = div('msg msg-assistant');
    el.id = id;
    el.innerHTML = `
      <div class="assistant-header">RAG Assistant</div>
      <div class="thinking">
        <span class="thinking-dot"></span>
        <span class="thinking-dot"></span>
        <span class="thinking-dot"></span>
      </div>`;
    convo.appendChild(el);
    scroll();
    return id;
  }

  function appendAssistant({ answer, sources, elapsed_ms }) {
    const el = div('msg msg-assistant');
    const srcId = 'src-' + Date.now();

    const sourcesHtml = sources.length ? `
      <button class="sources-toggle" aria-expanded="false" onclick="toggleSources(this,'${srcId}')">
        <span class="chevron">▶</span>&nbsp; ${sources.length} source${sources.length > 1 ? 's' : ''} utilisée${sources.length > 1 ? 's' : ''}
      </button>
      <div class="sources-list" id="${srcId}">
        ${sources.map((s, i) => `
          <div class="source-card" data-index="${i + 1}">
            <div class="source-text">${esc(s.text)}</div>
          </div>`).join('')}
      </div>` : '';

    el.innerHTML = `
      <div class="assistant-header">RAG Assistant</div>
      <div class="bubble-assistant">${esc(answer)}</div>
      ${sourcesHtml}
      <div class="meta">
        <span>⏱ ${(elapsed_ms / 1000).toFixed(1)} s</span>
        <span>📄 ${sources.length} chunk${sources.length > 1 ? 's' : ''}</span>
      </div>`;
    convo.appendChild(el);
    scroll();
  }

  function appendError(msg) {
    const el = div('msg msg-assistant');
    el.innerHTML = `
      <div class="assistant-header">Erreur</div>
      <div class="bubble-assistant" style="color:#f07070;border-left-color:#f07070">${esc(msg)}</div>`;
    convo.appendChild(el);
    scroll();
  }

  function toggleSources(btn, id) {
    const list = document.getElementById(id);
    const open = list.classList.toggle('open');
    btn.setAttribute('aria-expanded', open);
  }

  function removeElement(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }

  function div(cls) {
    const el = document.createElement('div');
    el.className = cls;
    return el;
  }

  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/\n/g, '<br>');
  }

  function scroll() {
    requestAnimationFrame(() => {
      convo.scrollTop = convo.scrollHeight;
    });
  }

  // expose for inline onclick
  window.toggleSources = toggleSources;
</script>
</body>
</html>
